name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  deb:
    name: build debian package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build .deb
        run: scripts/build-deb.sh
      - name: Verify .deb metadata
        run: |
          dpkg-deb --info dist/*.deb
          dpkg-deb --contents dist/*.deb | grep -E './usr/bin/rktop$'
          dpkg-deb --contents dist/*.deb | grep -E './usr/bin/stm -> rktop$'
      - name: Build Linux portable tarball
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          stage="target/portable/rktop"
          rm -rf "$stage"
          mkdir -p "$stage"
          cp target/release/rktop "$stage/rktop"
          cp config/rktop.example.toml "$stage/config.toml"
          cp README.md "$stage/README.md"
          cp LICENSE "$stage/LICENSE"
          tar -C target/portable -czf "dist/rktop_${version}_linux_x86_64.tar.gz" rktop
          sha256sum "dist/rktop_${version}_linux_x86_64.tar.gz" > "dist/rktop_${version}_linux_x86_64.tar.gz.sha256"
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes --title "$TAG"
          fi

  windows:
    name: build windows package
    runs-on: windows-latest
    needs: deb
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Windows executable
        shell: pwsh
        run: cargo build --release --locked
      - name: Package Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist, dist/rktop | Out-Null
          Copy-Item target/release/rktop.exe dist/rktop/rktop.exe
          Copy-Item config/rktop.example.toml dist/rktop/config.toml
          Copy-Item README.md dist/rktop/README.md
          Copy-Item LICENSE dist/rktop/LICENSE
          Copy-Item scripts/install.ps1 dist/rktop/install.ps1
          Compress-Archive -Path dist/rktop -DestinationPath dist/rktop_${{ github.ref_name }}_windows_x86_64.zip -Force
          Get-FileHash dist/rktop_${{ github.ref_name }}_windows_x86_64.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  rktop_${{ github.ref_name }}_windows_x86_64.zip" } |
            Set-Content dist/rktop_${{ github.ref_name }}_windows_x86_64.zip.sha256
      - name: Upload Windows package
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: pwsh
        run: gh release upload $env:TAG dist/rktop_${{ github.ref_name }}_windows_x86_64.zip dist/rktop_${{ github.ref_name }}_windows_x86_64.zip.sha256 --clobber

  macos:
    name: build macOS package
    runs-on: macos-15-intel
    needs: deb
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build macOS executable
        run: cargo build --release --locked
      - name: Package macOS tarball
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          stage="target/portable/rktop"
          rm -rf "$stage" dist
          mkdir -p "$stage" dist
          cp target/release/rktop "$stage/rktop"
          cp config/rktop.example.toml "$stage/config.toml"
          cp README.md "$stage/README.md"
          cp LICENSE "$stage/LICENSE"
          tar -C target/portable -czf "dist/rktop_${version}_macos_x86_64.tar.gz" rktop
          shasum -a 256 "dist/rktop_${version}_macos_x86_64.tar.gz" > "dist/rktop_${version}_macos_x86_64.tar.gz.sha256"
      - name: Upload macOS package
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" dist/rktop_*_macos_x86_64.tar.gz dist/rktop_*_macos_x86_64.tar.gz.sha256 --clobber
